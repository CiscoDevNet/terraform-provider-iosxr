---
name: Crypto SSL
path: Cisco-IOS-XR-um-crypto-cfg:/ssl
doc_category: Crypto
attributes:
  - yang_name: profiles/profile
    tf_name: profile
    description: "Template that will be pinned to applications"
    type: List
    attributes:
      - yang_name: profile-name
        id: true
        example: MTLS_PROFILE
      - yang_name: certificate
        tf_name: certificate
        description: "Router certificate to be used in mTLS session, only during enrollment or bootstrap phase."
        type: String
        example: CORP_PKI_CA
