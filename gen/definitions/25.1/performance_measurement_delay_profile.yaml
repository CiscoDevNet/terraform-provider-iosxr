  - yang_name: rsvp-te/default/probe/timestamp-format/ntp
    tf_name: ntp
    type: Bool
    type_yang_bool: presence
    example: true
  - yang_name: sr-policy/default/probe/collect-hbh
    tf_name: collect_hbh
    type: Bool
    type_yang_bool: presence
    example: true
  - yang_name: sr-policy/default/probe/timestamp-format/ntp
    tf_name: ntp
    type: Bool
